<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin K-FreshMeat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="notification.css">
</head>

<body class="login-page">
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <img src="logo.png" alt="K-FreshMeat Logo" style="height: 60px; object-fit: contain;">
        </div>
        <h1>MijuAdmin</h1>
        <p>Vui lòng đăng nhập để quản lý</p>

        <form id="login-form">
            <div class="form-group">
                <label>Email hoặc Tên đăng nhập</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn-admin">Đăng nhập</button>
            <div id="error-msg" class="error-msg">Sai thông tin đăng nhập!</div>
        </form>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('adminToken') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            // MVP Hardcoded credentials
            if (user === 'tranthithanhhuong' && pass === 'thanhhuong2001') {
                localStorage.setItem('adminToken', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        });
    </script>
    <script src="notification.js"></script>
</body>

</html>
